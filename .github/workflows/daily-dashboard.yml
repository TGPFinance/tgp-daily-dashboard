name: Daily Dashboard

on:
  schedule:
    - cron: '0 9 * * *'    # 4am ET — first attempt (post only if Amazon Ads ready)
    - cron: '0 11 * * *'   # 6am ET — FINAL attempt (post regardless)
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        env:
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
          IS_FINAL_ATTEMPT: ${{ (github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch') && 'true' || 'false' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html data_cache.json TGP-Logo-White.png
          git diff --staged --quiet || git commit -m "Dashboard update $(date +%Y-%m-%d)"
          git push

      - name: Check post flag
        id: check
        run: |
          FLAG=$(cat should_post.flag 2>/dev/null || echo "no")
          echo "should_post=$FLAG" >> $GITHUB_OUTPUT

      - name: Post to Slack
        if: steps.check.outputs.should_post == 'yes'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PAGES_URL="https://tgpfinance.github.io/tgp-daily-dashboard"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"📊 Daily Dashboard Updated: ${PAGES_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
