name: Daily Dashboard

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 9am UTC, Mon-Fri (adjust as needed)
  workflow_dispatch:         # lets you trigger it manually too

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

   - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard update $(date +%Y-%m-%d)"
          git push

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"📊 Daily dashboard is ready → $PAGES_URL\"}"
